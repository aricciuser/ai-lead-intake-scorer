version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Group routine non-security bumps so we don't get a PR per package.
    # Security advisories always get their own immediate PR regardless of grouping.
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
